openapi: 3.0.3
info:
  title: Golden Path Control Plane API
  version: 1.0.0
  description: |
    Internal developer platform control plane for service onboarding, readiness evaluation,
    deployment candidate review, and audit history.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /v1/services:
    post:
      operationId: registerService
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceInput'
      responses:
        '201':
          description: Service registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/services/{service_id}:
    patch:
      operationId: updateService
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServicePatch'
      responses:
        '200':
          description: Service updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/services/{service_id}/evaluations:
    post:
      operationId: queueServiceEvaluation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceID'
      responses:
        '202':
          description: Evaluation queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueEvaluationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/services/{service_id}/scorecard:
    get:
      operationId: getScorecard
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceID'
      responses:
        '200':
          description: Latest readiness scorecard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scorecard'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/deployment-candidates:
    post:
      operationId: createDeploymentCandidate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCandidateInput'
      responses:
        '201':
          description: Deployment candidate created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/deployment-candidates/{candidate_id}/evaluate:
    post:
      operationId: evaluateDeploymentCandidate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CandidateID'
      responses:
        '200':
          description: Deployment candidate evaluated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/deployment-candidates/{candidate_id}:
    get:
      operationId: getDeploymentCandidate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CandidateID'
      responses:
        '200':
          description: Deployment candidate retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/audit-events:
    get:
      operationId: listAuditEvents
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: resource_type
          schema:
            type: string
        - in: query
          name: resource_id
          schema:
            $ref: '#/components/schemas/UUID'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Audit events retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /healthz:
    get:
      operationId: healthz
      security: []
      responses:
        '200':
          description: Process health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      operationId: readyz
      security: []
      responses:
        '200':
          description: Runtime readiness.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /metrics:
    get:
      operationId: metrics
      security: []
      responses:
        '200':
          description: Prometheus metrics payload.
          content:
            text/plain:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ServiceID:
      in: path
      name: service_id
      required: true
      schema:
        $ref: '#/components/schemas/UUID'
    CandidateID:
      in: path
      name: candidate_id
      required: true
      schema:
        $ref: '#/components/schemas/UUID'
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authorization failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Request conflicts with current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: Dependency unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    UUID:
      type: string
      format: uuid
    Timestamp:
      type: string
      format: date-time
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id, remediation]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            remediation:
              type: string
            details:
              type: object
              additionalProperties: true
    Role:
      type: string
      enum: [engineer, platform-admin]
    ReadinessState:
      type: string
      enum: [ready, degraded, blocked]
    CheckStatus:
      type: string
      enum: [pass, warn, fail]
    CandidateStatus:
      type: string
      enum: [pending, approved, rejected]
    JobStatus:
      type: string
      enum: [pending, processing, completed, failed]
    SLOPolicyInput:
      type: object
      required:
        - availability_target_percent
        - latency_target_milliseconds
        - window
      properties:
        availability_target_percent:
          type: number
        latency_target_milliseconds:
          type: integer
        window:
          type: string
    ServiceInput:
      type: object
      required:
        - name
        - description
        - owner_email
        - repository_url
        - runbook_url
        - health_endpoint_url
        - observability_url
        - deployment_pipeline
        - has_ci
        - has_tracing
        - has_metrics
        - language
        - tier
        - lifecycle
        - slo_policy
      properties:
        name:
          type: string
        description:
          type: string
        owner_email:
          type: string
          format: email
        repository_url:
          type: string
          format: uri
        runbook_url:
          type: string
          format: uri
        health_endpoint_url:
          type: string
          format: uri
        observability_url:
          type: string
          format: uri
        deployment_pipeline:
          type: string
        has_ci:
          type: boolean
        has_tracing:
          type: boolean
        has_metrics:
          type: boolean
        language:
          type: string
        tier:
          type: integer
          minimum: 0
          maximum: 3
        lifecycle:
          type: string
        slo_policy:
          $ref: '#/components/schemas/SLOPolicyInput'
    ServicePatch:
      type: object
      properties:
        description:
          type: string
        owner_email:
          type: string
          format: email
        repository_url:
          type: string
          format: uri
        runbook_url:
          type: string
          format: uri
        health_endpoint_url:
          type: string
          format: uri
        observability_url:
          type: string
          format: uri
        deployment_pipeline:
          type: string
        has_ci:
          type: boolean
        has_tracing:
          type: boolean
        has_metrics:
          type: boolean
        language:
          type: string
        tier:
          type: integer
          minimum: 0
          maximum: 3
        lifecycle:
          type: string
        slo_policy:
          $ref: '#/components/schemas/SLOPolicyInput'
    SLOPolicy:
      type: object
      required:
        - id
        - service_id
        - availability_target_percent
        - latency_target_milliseconds
        - window
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        service_id:
          $ref: '#/components/schemas/UUID'
        availability_target_percent:
          type: number
        latency_target_milliseconds:
          type: integer
        window:
          type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    Service:
      type: object
      required:
        - id
        - name
        - description
        - owner_email
        - repository_url
        - runbook_url
        - health_endpoint_url
        - observability_url
        - deployment_pipeline
        - has_ci
        - has_tracing
        - has_metrics
        - language
        - tier
        - lifecycle
        - slo_policy
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        description:
          type: string
        owner_email:
          type: string
          format: email
        repository_url:
          type: string
          format: uri
        runbook_url:
          type: string
          format: uri
        health_endpoint_url:
          type: string
          format: uri
        observability_url:
          type: string
          format: uri
        deployment_pipeline:
          type: string
        has_ci:
          type: boolean
        has_tracing:
          type: boolean
        has_metrics:
          type: boolean
        language:
          type: string
        tier:
          type: integer
        lifecycle:
          type: string
        slo_policy:
          $ref: '#/components/schemas/SLOPolicy'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    ReadinessSnapshot:
      type: object
      required:
        - id
        - service_id
        - state
        - score
        - summary
        - evaluated_at
        - job_id
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        service_id:
          $ref: '#/components/schemas/UUID'
        state:
          $ref: '#/components/schemas/ReadinessState'
        score:
          type: integer
        summary:
          type: string
        evaluated_at:
          $ref: '#/components/schemas/Timestamp'
        job_id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/Timestamp'
    ReadinessCheckResult:
      type: object
      required:
        - id
        - snapshot_id
        - service_id
        - check_name
        - status
        - message
        - remediation_hint
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        snapshot_id:
          $ref: '#/components/schemas/UUID'
        service_id:
          $ref: '#/components/schemas/UUID'
        check_name:
          type: string
        status:
          $ref: '#/components/schemas/CheckStatus'
        message:
          type: string
        remediation_hint:
          type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
    Scorecard:
      type: object
      required: [service, snapshot, checks]
      properties:
        service:
          $ref: '#/components/schemas/Service'
        snapshot:
          $ref: '#/components/schemas/ReadinessSnapshot'
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessCheckResult'
    QueueEvaluationResponse:
      type: object
      required: [job_id, status, idempotency_key]
      properties:
        job_id:
          $ref: '#/components/schemas/UUID'
        status:
          $ref: '#/components/schemas/JobStatus'
        idempotency_key:
          type: string
    DeploymentCandidateInput:
      type: object
      required:
        - service_id
        - environment
        - version
        - commit_sha
        - requested_by
      properties:
        service_id:
          $ref: '#/components/schemas/UUID'
        environment:
          type: string
          enum: [development, staging, production]
        version:
          type: string
        commit_sha:
          type: string
        requested_by:
          type: string
          format: email
    PromotionDecision:
      type: object
      required:
        - id
        - candidate_id
        - decision
        - summary
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        candidate_id:
          $ref: '#/components/schemas/UUID'
        snapshot_id:
          $ref: '#/components/schemas/UUID'
        decision:
          $ref: '#/components/schemas/CandidateStatus'
        summary:
          type: string
        created_at:
          $ref: '#/components/schemas/Timestamp'
    DeploymentCandidate:
      type: object
      required:
        - id
        - service_id
        - environment
        - version
        - commit_sha
        - requested_by
        - status
        - decision_reason
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        service_id:
          $ref: '#/components/schemas/UUID'
        environment:
          type: string
        version:
          type: string
        commit_sha:
          type: string
        requested_by:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/CandidateStatus'
        decision_reason:
          type: string
        last_snapshot_id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        evaluated_at:
          $ref: '#/components/schemas/Timestamp'
        promotion_decision:
          $ref: '#/components/schemas/PromotionDecision'
    AuditEvent:
      type: object
      required:
        - id
        - actor_subject
        - actor_role
        - event_type
        - resource_type
        - resource_id
        - request_id
        - details
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        actor_subject:
          type: string
        actor_role:
          $ref: '#/components/schemas/Role'
        event_type:
          type: string
        resource_type:
          type: string
        resource_id:
          $ref: '#/components/schemas/UUID'
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
        created_at:
          $ref: '#/components/schemas/Timestamp'
    AuditEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
