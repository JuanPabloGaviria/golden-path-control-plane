name: ci

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: controlplane
          POSTGRES_USER: controlplane
          POSTGRES_PASSWORD: controlplane
        options: >-
          --health-cmd "pg_isready -U controlplane -d controlplane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      APP_LOG_LEVEL: INFO
      HTTP_ADDR: :8080
      HTTP_READ_TIMEOUT: 10s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_IDLE_TIMEOUT: 60s
      SHUTDOWN_TIMEOUT: 20s
      DATABASE_URL: postgres://controlplane:controlplane@localhost:5432/controlplane?sslmode=disable
      DATABASE_MAX_OPEN_CONNS: 10
      DATABASE_MIN_IDLE_CONNS: 2
      DATABASE_MAX_CONN_LIFETIME: 30m
      DATABASE_MAX_CONN_IDLE_TIME: 5m
      WORKER_POLL_INTERVAL: 1s
      WORKER_BATCH_SIZE: 5
      JOB_LEASE_DURATION: 30s
      JOB_MAX_ATTEMPTS: 5
      AUTH_MODE: hmac
      AUTH_AUDIENCE: golden-path-control-plane
      AUTH_ISSUER: golden-path-local
      AUTH_HMAC_SECRET: 12345678901234567890123456789012
      OTEL_SERVICE_NAME: golden-path-control-plane
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      PROMETHEUS_NAMESPACE: goldenpath
      CONTROL_PLANE_INTEGRATION_DATABASE_URL: postgres://controlplane:controlplane@localhost:5432/controlplane?sslmode=disable
      CONTROL_PLANE_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          install-mode: binary
          args: --timeout=5m

      - name: Unit tests
        run: go test ./...

      - name: Race tests
        run: go test -race ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Integration race tests
        run: go test -race -tags=integration ./...

      - name: Build binaries
        run: |
          go build ./cmd/api
          go build ./cmd/worker
          go build ./cmd/cli

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability scan
        run: govulncheck ./...

      - name: Smoke flow
        run: ./scripts/smoke.sh
