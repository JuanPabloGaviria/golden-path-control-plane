name: ci

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: controlplane
          POSTGRES_USER: controlplane
          POSTGRES_PASSWORD: controlplane
        options: >-
          --health-cmd "pg_isready -U controlplane -d controlplane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      APP_LOG_LEVEL: INFO
      HTTP_ADDR: :8080
      HTTP_READ_TIMEOUT: 10s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_IDLE_TIMEOUT: 60s
      SHUTDOWN_TIMEOUT: 20s
      DATABASE_URL: postgres://controlplane:controlplane@localhost:5432/controlplane?sslmode=disable
      DATABASE_MAX_OPEN_CONNS: 10
      DATABASE_MIN_IDLE_CONNS: 2
      DATABASE_MAX_CONN_LIFETIME: 30m
      DATABASE_MAX_CONN_IDLE_TIME: 5m
      WORKER_POLL_INTERVAL: 1s
      WORKER_BATCH_SIZE: 5
      JOB_LEASE_DURATION: 30s
      JOB_MAX_ATTEMPTS: 5
      AUTH_MODE: hmac
      AUTH_AUDIENCE: golden-path-control-plane
      AUTH_ISSUER: golden-path-local
      AUTH_HMAC_SECRET: "golden-path-smoke-secret-01234567"
      OTEL_SERVICE_NAME: golden-path-control-plane
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      PROMETHEUS_NAMESPACE: goldenpath
      CONTROL_PLANE_INTEGRATION_DATABASE_URL: postgres://controlplane:controlplane@localhost:5432/controlplane?sslmode=disable
      CONTROL_PLANE_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: azure/setup-kubectl@v4

      - name: Install pinned Go tools
        run: make tools

      - name: Core verification
        run: make ci

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Integration race tests
        run: go test -race -tags=integration ./...

      - name: Render Kubernetes overlay
        run: make render-k8s

      - name: Smoke flow
        run: ./scripts/smoke.sh

  runtime-proof:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Docker Compose OIDC smoke
        run: make smoke-compose

  kind-proof:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: azure/setup-kubectl@v4

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.23.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: kind smoke
        run: make smoke-kind

  security:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v5

      - name: Config and manifest scan
        run: make scan-config

      - name: Image scan
        run: make scan-image
