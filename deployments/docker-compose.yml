services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: controlplane
      POSTGRES_USER: controlplane
      POSTGRES_PASSWORD: controlplane
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlplane -d controlplane"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_BIN: api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_LOG_LEVEL: INFO
      HTTP_ADDR: :8080
      HTTP_READ_TIMEOUT: 10s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_IDLE_TIMEOUT: 60s
      SHUTDOWN_TIMEOUT: 20s
      DATABASE_URL: postgres://controlplane:controlplane@postgres:5432/controlplane?sslmode=disable
      DATABASE_MAX_OPEN_CONNS: 10
      DATABASE_MIN_IDLE_CONNS: 2
      DATABASE_MAX_CONN_LIFETIME: 30m
      DATABASE_MAX_CONN_IDLE_TIME: 5m
      WORKER_POLL_INTERVAL: 2s
      WORKER_BATCH_SIZE: 5
      JOB_LEASE_DURATION: 30s
      JOB_MAX_ATTEMPTS: 5
      AUTH_MODE: hmac
      AUTH_AUDIENCE: golden-path-control-plane
      AUTH_ISSUER: golden-path-local
      AUTH_HMAC_SECRET: ${AUTH_HMAC_SECRET:?AUTH_HMAC_SECRET must be set}
      OTEL_SERVICE_NAME: golden-path-control-plane
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      PROMETHEUS_NAMESPACE: goldenpath

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP_BIN: worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_LOG_LEVEL: INFO
      HTTP_ADDR: :8080
      HTTP_READ_TIMEOUT: 10s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_IDLE_TIMEOUT: 60s
      SHUTDOWN_TIMEOUT: 20s
      DATABASE_URL: postgres://controlplane:controlplane@postgres:5432/controlplane?sslmode=disable
      DATABASE_MAX_OPEN_CONNS: 10
      DATABASE_MIN_IDLE_CONNS: 2
      DATABASE_MAX_CONN_LIFETIME: 30m
      DATABASE_MAX_CONN_IDLE_TIME: 5m
      WORKER_POLL_INTERVAL: 2s
      WORKER_BATCH_SIZE: 5
      JOB_LEASE_DURATION: 30s
      JOB_MAX_ATTEMPTS: 5
      AUTH_MODE: hmac
      AUTH_AUDIENCE: golden-path-control-plane
      AUTH_ISSUER: golden-path-local
      AUTH_HMAC_SECRET: ${AUTH_HMAC_SECRET:?AUTH_HMAC_SECRET must be set}
      OTEL_SERVICE_NAME: golden-path-control-plane
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      PROMETHEUS_NAMESPACE: goldenpath
