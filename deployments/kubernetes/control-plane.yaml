apiVersion: v1
kind: Namespace
metadata:
  name: golden-path
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: golden-path
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "INFO"
  HTTP_ADDR: ":8080"
  HTTP_READ_TIMEOUT: "10s"
  HTTP_WRITE_TIMEOUT: "15s"
  HTTP_IDLE_TIMEOUT: "60s"
  SHUTDOWN_TIMEOUT: "20s"
  DATABASE_MAX_OPEN_CONNS: "20"
  DATABASE_MIN_IDLE_CONNS: "4"
  DATABASE_MAX_CONN_LIFETIME: "30m"
  DATABASE_MAX_CONN_IDLE_TIME: "5m"
  WORKER_POLL_INTERVAL: "2s"
  WORKER_BATCH_SIZE: "5"
  JOB_LEASE_DURATION: "30s"
  JOB_MAX_ATTEMPTS: "5"
  AUTH_MODE: "hmac"
  AUTH_AUDIENCE: "golden-path-control-plane"
  AUTH_ISSUER: "golden-path-local"
  OTEL_SERVICE_NAME: "golden-path-control-plane"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  PROMETHEUS_NAMESPACE: "goldenpath"
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-secrets
  namespace: golden-path
type: Opaque
stringData:
  DATABASE_URL: "postgres://controlplane:replace-me@postgres.example.internal:5432/controlplane?sslmode=require"
  AUTH_HMAC_SECRET: "replace-before-deploy"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-api
  namespace: golden-path
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane-api
  template:
    metadata:
      labels:
        app: control-plane-api
    spec:
      containers:
        - name: api
          image: ghcr.io/juanpablogaviria/golden-path-control-plane:api-latest
          args: []
          envFrom:
            - configMapRef:
                name: control-plane-config
            - secretRef:
                name: control-plane-secrets
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-api
  namespace: golden-path
spec:
  selector:
    app: control-plane-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-worker
  namespace: golden-path
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane-worker
  template:
    metadata:
      labels:
        app: control-plane-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/juanpablogaviria/golden-path-control-plane:worker-latest
          envFrom:
            - configMapRef:
                name: control-plane-config
            - secretRef:
                name: control-plane-secrets
