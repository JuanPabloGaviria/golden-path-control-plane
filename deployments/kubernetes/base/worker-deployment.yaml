apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-worker
  labels:
    app.kubernetes.io/name: control-plane-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: golden-path-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: golden-path-control-plane
    spec:
      serviceAccountName: control-plane
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: golden-path-control-plane-worker
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: control-plane-config
            - secretRef:
                name: control-plane-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
