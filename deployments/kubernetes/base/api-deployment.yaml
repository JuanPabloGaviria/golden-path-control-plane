apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-api
  labels:
    app.kubernetes.io/name: control-plane-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: golden-path-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: golden-path-control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: golden-path-control-plane-api
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: control-plane-config
            - secretRef:
                name: control-plane-secrets
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
